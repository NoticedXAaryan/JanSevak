service_id: income_certificate
name_en: Income Certificate
name_hi: आय प्रमाण पत्र
department: Revenue Department
issuing_authority: Revenue / Local Administration
applicable_states:
- all
description_en: An official document that certifies the annual income of a person
  or their family.
description_hi: एक आधिकारिक दस्तावेज जो किसी व्यक्ति या उनके परिवार की वार्षिक आय
  को प्रमाणित करता है।
required_documents:
- name_en: Aadhaar Card
  name_hi: आधार कार्ड
  mandatory: true
- name_en: Ration Card or ID Proof
  name_hi: राशन कार्ड या पहचान पत्र
  mandatory: true
- name_en: Self Declaration / Affidavit
  name_hi: स्व-घोषणा / शपथ पत्र
  mandatory: true
- name_en: Salary Slip (if employed)
  name_hi: वेतन पर्ची (यदि कार्यरत हैं)
  mandatory: false
process_steps:
- step: 1
  en: Visit the state e-District portal or nearest CSC (Common Service Center).
  hi: राज्य ई-डिस्ट्रिक्ट पोर्टल या नजदीकी सीएससी (CSC) पर जाएं।
- step: 2
  en: Fill out the Income Certificate application form.
  hi: आय प्रमाण पत्र आवेदन पत्र भरें।
- step: 3
  en: Upload scanned copies of required documents.
  hi: आवश्यक दस्तावेजों की स्कैन कॉपी अपलोड करें।
- step: 4
  en: Pay the nominal processing fee and get the receipt.
  hi: नाममात्र शुल्क का भुगतान करें और रसीद प्राप्त करें।
estimated_timeline: 10-15 days
approximate_fee: ₹20 - ₹50
tags:
- income
- certificate
- revenue
- scholarship
