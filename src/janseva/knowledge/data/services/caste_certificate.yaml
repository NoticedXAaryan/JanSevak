service_id: caste_certificate
name_en: Caste Certificate
name_hi: जाति प्रमाण पत्र
department: Revenue Department
issuing_authority: Revenue / Local Administration
applicable_states:
- all
description_en: Proof of belonging to a particular caste (SC, ST, OBC) to avail government
  benefits.
description_hi: सरकारी लाभ प्राप्त करने সরকারী लाभ प्राप्त करने के लिए विशेष जाति
  (SC, ST, OBC) से संबंधित होने का प्रमाण।
required_documents:
- name_en: Aadhaar Card
  name_hi: आधार कार्ड
  mandatory: true
- name_en: Family member's caste certificate (if available)
  name_hi: परिवार के सदस्य का जाति प्रमाण पत्र
  mandatory: false
- name_en: Address Proof (Electricity Bill/Ration Card)
  name_hi: पता प्रमाण (बिजली बिल/राशन कार्ड)
  mandatory: true
- name_en: Affidavit confirming caste
  name_hi: जाति की पुष्टि करने वाला शपथ पत्र
  mandatory: true
process_steps:
- step: 1
  en: Visit the state e-District portal or Tehsil office.
  hi: राज्य ई-डिस्ट्रिक्ट पोर्टल या तहसील कार्यालय पर जाएं।
- step: 2
  en: Submit the application with proof of ancestry/caste.
  hi: वंशावली/जाति के प्रमाण के साथ आवेदन जमा करें।
estimated_timeline: 15-30 days
approximate_fee: ₹20 - ₹50
tags:
- caste
- certificate
- reservation
- obc
- sc
- st
