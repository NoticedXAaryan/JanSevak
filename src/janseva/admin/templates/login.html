{% extends "base.html" %}

{% block title %}Admin Login — JanSeva{% endblock %}

{% block content %}
<div class="wrapper-centered animate-fade-up">
    <div class="glass-panel auth-wrapper">
        <div class="text-center mb-8">
            <h2>Admin Login</h2>
            <p class="mt-2">Secure access for JanSeva administrators</p>
        </div>
        
        {% if error_msg %}
        <div class="alert alert-error">
            {{ error_msg }}
        </div>
        {% endif %}
        
        <form hx-post="/admin/login" hx-target="#login-error" hx-swap="innerHTML">
            <input type="hidden" name="remember" value="true">
            
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" type="text" required class="input-field" placeholder="Enter your username">
            </div>
            
            <div class="form-group mb-8">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" required class="input-field" placeholder="Enter your password">
            </div>

            <div id="login-error"></div>

            <button type="submit" class="btn btn-primary w-full btn-lg">
                Sign in with Local Admin
            </button>
        </form>
        
        {% if google_enabled %}
        <div class="mt-8 text-center">
            <div style="position: relative; margin-bottom: 2rem;">
                <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-default);"></div>
                <span style="position: relative; background: var(--bg-surface); padding: 0 1rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 500;">Or continue with</span>
            </div>

            <a href="/admin/auth/google/login" class="btn btn-secondary w-full btn-lg">
                <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px; margin-right: 8px;">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
