# docker-compose.yml
# Runs PostgreSQL and Redis for local development.
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: janseva-postgres
    environment:
      POSTGRES_USER: janseva
      POSTGRES_PASSWORD: janseva_dev
      POSTGRES_DB: janseva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janseva"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: janseva-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: janseva-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # In Dockply, you will typically provide env vars in the UI. 
    # For local testing, we load them from .env
    env_file:
      - .env
    volumes:
      - chromadata:/app/.chromadb

volumes:
  pgdata:
  redisdata:
  chromadata:
